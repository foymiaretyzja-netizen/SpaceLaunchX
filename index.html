<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceLaunchX - Main Menu</title>
    <style>
        /* --- CORE STYLES --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background-color: #000; /* Fallback */
        }

        /* --- SPACE BACKGROUND WITH ANIMATED STARS --- */
        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Puts background behind UI */
            background: radial-gradient(circle at center, #00172d 0%, #000000 100%);
        }

        /* Star Layers (creating depth) */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starFlicker 5s linear infinite;
        }

        .stars.medium {
            background-size: 400px 400px, 200px 200px, 150px 150px;
            background-position: 50px 50px, 100px 100px, 200px 200px;
            animation-duration: 7s;
            opacity: 0.7;
        }

        .stars.far {
            background-size: 300px 300px, 150px 150px, 100px 100px;
            background-position: 75px 75px, 150px 150px, 250px 250px;
            animation-duration: 10s;
            opacity: 0.5;
        }

        @keyframes starFlicker {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* Shooting Star - Randomized by CSS nth-child */
        .shooting-star {
            position: absolute;
            top: 0;
            left: -100px;
            width: 150px;
            height: 2px;
            background: linear-gradient(-45deg, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            filter: drop-shadow(0 0 6px white);
            animation: shootingStarAnim 10s linear infinite;
            opacity: 0;
        }

        .shooting-star:nth-child(1) { top: 10%; animation-delay: 2s; animation-duration: 12s; }
        .shooting-star:nth-child(2) { top: 30%; animation-delay: 7s; animation-duration: 8s; }
        .shooting-star:nth-child(3) { top: 60%; animation-delay: 15s; animation-duration: 15s; }

        @keyframes shootingStarAnim {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            1% { opacity: 1; }
            10% { transform: translateX(120vw) translateY(120vh) rotate(-45deg); opacity: 0; }
            100% { transform: translateX(120vw) translateY(120vh) rotate(-45deg); opacity: 0; }
        }

        /* --- MAIN MENU UI STRUCTURE --- */
        #main-menu-lyr {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #menu-content {
            background-color: rgba(0, 10, 20, 0.85); /* Semi-transparent panel */
            padding: 50px;
            border-radius: 15px;
            border: 2px solid #0056b3;
            box-shadow: 0 0 30px rgba(0, 86, 179, 0.6);
            text-align: center;
            width: 400px;
            backdrop-filter: blur(5px); /* Frosty glass effect */
        }

        #game-title {
            font-size: 3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: white;
            text-shadow: 0 0 10px #007bff, 0 0 20px #007bff;
            margin-bottom: 50px;
        }

        #menu-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- ROBUST SFS-STYLE BUTTONS --- */
        .menu-btn {
            background: linear-gradient(180deg, #004085 0%, #002752 100%);
            color: white;
            border: 2px solid #0056b3;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        /* Hover effect */
        .menu-btn:hover {
            background: linear-gradient(180deg, #0056b3 0%, #004085 100%);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.8);
            transform: scale(1.02);
        }

        /* Click effect */
        .menu-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.8);
        }

        /* Decorative line under button text */
        .menu-btn::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 10%;
            width: 80%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* --- CREDITS POPUP LAYER --- */
        #popup-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #credits-panel {
            background-color: rgba(0, 10, 20, 1);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #ffc107; /* Gold accent for credits */
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
            text-align: center;
            width: 500px;
        }

        #popup-layer h2 {
            color: #ffc107;
            margin-bottom: 20px;
        }

        #close-credits {
            margin-top: 30px;
            background: linear-gradient(180deg, #555 0%, #222 100%);
            border: 2px solid #777;
        }
        #close-credits:hover {
            background: linear-gradient(180deg, #777 0%, #444 100%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

    </style>
</head>
<body>

    <div id="space-container">
        <div class="stars"></div>
        <div class="stars medium"></div>
        <div class="stars far"></div>
        
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
    </div>

    <div id="main-menu-lyr">
        <div id="menu-content">
            <div id="game-title">SpaceLaunchX</div>
            
            <div id="menu-buttons-container">
                <button class="menu-btn" onclick="startNewGame()">Create New Game</button>
                <button class="menu-btn" onclick="loadGame()">Load Game</button>
                <button class="menu-btn" onclick="showCredits()">Credits</button>
            </div>
        </div>
    </div>

    <div id="popup-layer">
        <div id="credits-panel">
            <h2>SpaceLaunchX Credits</h2>
            <p><strong>Game Concept:</strong> Inspired by SFS</p>
            <p><strong>Development:</strong> Your Name / Your Team</p>
            <p><strong>Background & UI:</strong> Generative AI Assistance</p>
            <p>built with HTML, CSS, & JavaScript</p>
            <button class="menu-btn" id="close-credits" onclick="hideCredits()">Close</button>
        </div>
    </div>

    <script>
        // Use standard SFS flow: button clicks start functions.
        
        function startNewGame() {
            alert("Create New Game requested. This is where you will initialize a new universe!");
            // flow: hide menu, show game canvas
        }

        function loadGame() {
            alert("Load Game requested. Check LocalStorage or server for saves.");
        }

        // Show/Hide Credits Popup
        const popupLayer = document.getElementById('popup-layer');

        function showCredits() {
            popupLayer.style.display = 'flex';
        }

        function hideCredits() {
            popupLayer.style.display = 'none';
        }

        // Close credits if user clicks outside the panel
        popupLayer.addEventListener('click', function(event) {
            if (event.target === popupLayer) {
                hideCredits();
            }
        });
    </script>
</body>
</html>
