<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceLaunch X</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- HIGH PERFORMANCE BACKGROUND --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas handles the stars with 0 lag */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* --- UI CONTAINER & VIEWS --- */
        .ui-layer {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .view-container {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-in-out;
            width: 100%;
            max-width: 400px;
        }

        .active-view {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SFS STYLE TITLE --- */
        .title-main {
            font-family: 'Teko', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            line-height: 0.8;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 2px;
            /* Metallic white-to-blue gradient */
            background: linear-gradient(to bottom, #ffffff 0%, #e0eaf5 40%, #7ca1d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.8));
        }

        /* --- SFS STYLE BUTTONS --- */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 4px; /* Tight stacking like the image */
            width: 240px;
        }

        button {
            background: linear-gradient(to bottom, #2d3440 0%, #171b22 100%);
            border: 1px solid #0a0c10;
            border-radius: 4px;
            color: #e6edf5;
            padding: 10px 20px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.5);
            transition: background 0.1s;
        }

        button:hover {
            background: linear-gradient(to bottom, #3c4554 0%, #20262e 100%);
            color: #ffffff;
        }

        button:active {
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            transform: translateY(1px);
        }

        /* --- INPUTS & MENUS --- */
        h2 {
            font-family: 'Teko', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 15px 0;
            color: #e0eaf5;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #171b22;
            border: 1px solid #4a5a73;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        input:focus { 
            outline: none; 
            border-color: #7ca1d4;
        }

        .save-list {
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .save-item {
            background: #171b22;
            border: 1px solid #2d3440;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            text-align: center;
        }

        .save-item h4 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .save-item p { margin: 0 0 10px 0; font-size: 0.75rem; color: #888; }
        
        .save-actions {
            display: flex;
            gap: 5px;
        }

        .save-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
        }

        p.text-content {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        /* --- FOOTER --- */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }

        .footer-btn {
            background: #171b22;
            border: 1px solid #000;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #ccc;
        }
        .footer-btn:hover { background: #2d3440; color: #fff; }
        
        .version {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #666;
            z-index: 10;
            text-align: right;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="ui-layer">
        <div class="title-main">
            SPACELAUNCH<br>X
        </div>

        <div id="main-menu" class="view-container active-view">
            <div class="button-stack">
                <button onclick="showView('new-game-menu')">New Game</button>
                <button onclick="openLoadMenu()">Load Game</button>
                <button onclick="showView('settings-menu')">Settings</button>
                <button onclick="showView('credits-menu')">Credits</button>
                <button onclick="alert('Exit not supported in browser.')">Exit</button>
            </div>
        </div>

        <div id="new-game-menu" class="view-container">
            <h2>NEW GAME</h2>
            <input type="text" id="agency-name" placeholder="World Name" autocomplete="off">
            <div class="button-stack">
                <button onclick="createNewGame()">Create</button>
                <button onclick="showView('main-menu')">Back</button>
            </div>
        </div>

        <div id="load-game-menu" class="view-container">
            <h2>LOAD GAME</h2>
            <div class="save-list" id="save-list-container">
                </div>
            <div class="button-stack" style="width: 100%;">
                <button onclick="showView('main-menu')">Back</button>
            </div>
        </div>

        <div id="settings-menu" class="view-container">
            <h2>SETTINGS</h2>
            <p class="text-content">Settings configuration coming soon.</p>
            <div class="button-stack">
                <button onclick="showView('main-menu')">Back</button>
            </div>
        </div>

        <div id="credits-menu" class="view-container">
            <h2>CREDITS</h2>
            <p class="text-content">
                <strong>SpaceLaunch X</strong><br>
                A browser-based orbital simulator.<br><br>
                Developer: [Your Name]
            </p>
            <div class="button-stack">
                <button onclick="showView('main-menu')">Back</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-btn">YouTube</div>
        <div class="footer-btn">Reddit</div>
        <div class="footer-btn">Discord</div>
    </div>
    <div class="version">
        v1.0.0 - Alpha<br>(Browser Build)
    </div>

    <script>
        // --- 0-LAG CANVAS STARFIELD ---
        function initStars() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff';
            // Draw 400 static stars instantly
            for(let i = 0; i < 400; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.5;
                const opacity = Math.random() * 0.8 + 0.2;
                
                ctx.globalAlpha = opacity;
                ctx.fillRect(x, y, size, size);
            }
        }
        
        // Resize canvas if window changes
        window.addEventListener('resize', initStars);
        initStars();

        // --- NAVIGATION LOGIC ---
        function showView(viewId) {
            document.querySelectorAll('.view-container').forEach(el => {
                el.classList.remove('active-view');
            });
            document.getElementById(viewId).classList.add('active-view');
            
            if(viewId === 'new-game-menu') {
                document.getElementById('agency-name').value = '';
                document.getElementById('agency-name').focus();
            }
        }

        // --- GAME SAVE LOGIC ---
        const STORAGE_KEY = 'spaceLaunchX_saves';

        function getSaves() {
            const saves = localStorage.getItem(STORAGE_KEY);
            return saves ? JSON.parse(saves) : [];
        }

        function createNewGame() {
            const nameInput = document.getElementById('agency-name');
            const name = nameInput.value.trim();

            if (!name) {
                alert("Please enter a world name.");
                return;
            }

            const saves = getSaves();
            const newSave = {
                id: 'save_' + Date.now(),
                name: name,
                createdAt: new Date().toLocaleString(),
                gameData: { rocketsBuilt: 0 } 
            };

            saves.push(newSave);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saves));
            
            openLoadMenu();
        }

        function openLoadMenu() {
            const saves = getSaves();
            const container = document.getElementById('save-list-container');
            container.innerHTML = ''; 

            if (saves.length === 0) {
                container.innerHTML = '<p class="text-content">No worlds found.</p>';
            } else {
                saves.slice().reverse().forEach(save => {
                    const saveBlock = document.createElement('div');
                    saveBlock.className = 'save-item';
                    
                    saveBlock.innerHTML = `
                        <h4>${save.name}</h4>
                        <p>${save.createdAt}</p>
                        <div class="save-actions">
                            <button onclick="playGame('${save.id}')">Play</button>
                            <button onclick="downloadData('${save.id}')">Backup</button>
                        </div>
                    `;
                    container.appendChild(saveBlock);
                });
            }
            showView('load-game-menu');
        }

        function playGame(saveId) {
            localStorage.setItem('spaceLaunchX_activeSaveId', saveId);
            window.location.href = 'Builder.html';
        }

        function downloadData(saveId) {
            const saves = getSaves();
            const saveToDownload = saves.find(s => s.id === saveId);
            
            if(!saveToDownload) return;

            const dataStr = JSON.stringify(saveToDownload, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${saveToDownload.name}_Backup.json`;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
